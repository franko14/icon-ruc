<!DOCTYPE html>
<html>
<head>
    <title>Test DWD API Connection</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #1a1a1a; color: white; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #0f5132; }
        .error { background: #842029; }
        .info { background: #055160; }
        pre { background: #2a2a2a; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🧪 DWD API Connection Test</h1>
    
    <button id="testBtn" onclick="testDWDConnection()">Test DWD Connection</button>
    
    <div id="results"></div>
    
    <script>
        async function testDWDConnection() {
            const results = document.getElementById('results');
            results.innerHTML = '<div class="test-result info">Testing DWD connection...</div>';
            
            try {
                const dwdUrl = 'https://opendata.dwd.de/weather/nwp/v1/m/icon-d2-ruc-eps/p/TOT_PREC/r/';
                const corsProxy = `https://api.allorigins.win/get?url=${encodeURIComponent(dwdUrl)}`;
                
                console.log('Testing URL:', corsProxy);
                
                const response = await fetch(corsProxy);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                const htmlContent = data.contents;
                
                // Extract run times using the same pattern as pipeline
                const runTimePattern = /(\\d{4}-\\d{2}-\\d{2}T\\d{2}%3A00)\\//g;
                const runMatches = [...htmlContent.matchAll(runTimePattern)];
                const availableRuns = runMatches.map(match => match[1]).reverse(); // newest first
                
                results.innerHTML = `
                    <div class="test-result success">✅ DWD Connection Successful!</div>
                    <div class="test-result info">Found ${availableRuns.length} available runs:</div>
                    <pre>${JSON.stringify(availableRuns.slice(0, 12), null, 2)}</pre>
                    <div class="test-result info">Raw HTML sample:</div>
                    <pre>${htmlContent.substring(0, 1000)}...</pre>
                `;
                
            } catch (error) {
                console.error('DWD test error:', error);
                results.innerHTML = `
                    <div class="test-result error">❌ DWD Connection Failed</div>
                    <div class="test-result error">Error: ${error.message}</div>
                `;
            }
        }
        
        // Auto-run test on page load
        window.addEventListener('load', testDWDConnection);
    </script>
</body>
</html>
