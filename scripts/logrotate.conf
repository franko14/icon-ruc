# Logrotate configuration for ICON-RUC application logs

/var/log/app/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    sharedscripts
    copytruncate
    create 644 root root
    
    postrotate
        # Send SIGUSR1 to application processes to reopen log files
        /usr/bin/killall -USR1 gunicorn 2>/dev/null || true
        /usr/bin/killall -USR1 python 2>/dev/null || true
    endscript
}

/var/log/app/error.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    sharedscripts
    copytruncate
    create 644 root root
    
    # Keep error logs longer
    maxage 30
}

/var/log/app/access.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    sharedscripts
    copytruncate
    create 644 root root
    
    # Compress access logs more aggressively
    maxage 14
}