name: Infrastructure Monitoring

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Check Production Health
      run: |
        # Check main application
        response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.PROD_URL }}/api/health)
        if [ "$response" != "200" ]; then
          echo "❌ Production health check failed with status: $response"
          exit 1
        fi
        echo "✅ Production health check passed"
        
        # Check API endpoints
        response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.PROD_URL }}/api/variables)
        if [ "$response" != "200" ]; then
          echo "❌ API variables endpoint failed with status: $response"
          exit 1
        fi
        echo "✅ API endpoints healthy"

    - name: Check Staging Health
      run: |
        # Check staging application
        response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.STAGING_URL }}/api/health)
        if [ "$response" != "200" ]; then
          echo "⚠️ Staging health check failed with status: $response"
          # Don't fail the job for staging issues
        else
          echo "✅ Staging health check passed"
        fi

    - name: Check SSL Certificate
      run: |
        # Check SSL certificate expiration
        domain=$(echo ${{ secrets.PROD_URL }} | sed 's|https://||' | cut -d'/' -f1)
        expiry_date=$(echo | openssl s_client -servername $domain -connect $domain:443 2>/dev/null | openssl x509 -noout -dates | grep notAfter | cut -d'=' -f2)
        expiry_epoch=$(date -d "$expiry_date" +%s)
        current_epoch=$(date +%s)
        days_until_expiry=$(( (expiry_epoch - current_epoch) / 86400 ))
        
        if [ $days_until_expiry -lt 30 ]; then
          echo "⚠️ SSL certificate expires in $days_until_expiry days"
        else
          echo "✅ SSL certificate valid for $days_until_expiry days"
        fi

    - name: Notify on Failure
      uses: 8398a7/action-slack@v3
      if: failure()
      with:
        status: failure
        text: "🚨 Health check failed for ICON-RUC application"
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  performance-check:
    name: Performance Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Run Performance Tests
      run: |
        # Test API response times
        start_time=$(date +%s%N)
        curl -s ${{ secrets.PROD_URL }}/api/variables > /dev/null
        end_time=$(date +%s%N)
        response_time=$(( (end_time - start_time) / 1000000 ))
        
        if [ $response_time -gt 5000 ]; then
          echo "⚠️ API response time is slow: ${response_time}ms"
        else
          echo "✅ API response time: ${response_time}ms"
        fi
        
        # Store metrics for trending
        echo "api_response_time_ms=$response_time" >> $GITHUB_OUTPUT

    - name: Check Database Performance
      run: |
        # This would typically connect to a monitoring endpoint
        echo "Database performance check placeholder"
        # In practice, you'd check query performance, connection pool status, etc.

  backup-check:
    name: Backup Verification
    runs-on: ubuntu-latest
    
    steps:
    - name: Verify Backup Integrity
      run: |
        # Check if backups are recent and valid
        echo "Backup verification placeholder"
        # In practice, you'd verify backup files exist, are recent, and can be restored