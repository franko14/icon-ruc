version: '3.8'

# Production configuration overrides
services:
  app:
    image: ghcr.io/your-username/icon-ruc:latest
    build:
      context: .
      target: production
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://iconuser:${POSTGRES_PASSWORD}@db:5432/iconruc
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=info
      - GUNICORN_WORKERS=4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    environment:
      - POSTGRES_SHARED_PRELOAD_LIBRARIES=pg_stat_statements
      - POSTGRES_INITDB_ARGS=--data-checksums
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.max=10000
      -c pg_stat_statements.track=all
      -c max_connections=100
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=4MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB

  redis:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    command: >
      redis-server
      --maxmemory 400mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --save 900 1
      --save 300 10
      --save 60 10000

  nginx:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # Additional production services
  node_exporter:
    image: prom/node-exporter:latest
    container_name: icon-ruc-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - icon-network

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: icon-ruc-postgres-exporter
    restart: unless-stopped
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://iconuser:${POSTGRES_PASSWORD}@db:5432/iconruc?sslmode=disable
    depends_on:
      - db
    networks:
      - icon-network

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: icon-ruc-redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
    depends_on:
      - redis
    networks:
      - icon-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: icon-ruc-cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    networks:
      - icon-network

  blackbox_exporter:
    image: prom/blackbox-exporter:latest
    container_name: icon-ruc-blackbox-exporter
    restart: unless-stopped
    ports:
      - "9115:9115"
    volumes:
      - ./monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml
    networks:
      - icon-network

  # Log rotation and management
  logrotate:
    image: alpine:latest
    container_name: icon-ruc-logrotate
    restart: unless-stopped
    volumes:
      - app_logs:/var/log/app
      - ./scripts/logrotate.conf:/etc/logrotate.d/icon-ruc
    command: >
      sh -c "
        while true; do
          logrotate -f /etc/logrotate.d/icon-ruc
          sleep 86400
        done
      "
    networks:
      - icon-network

networks:
  icon-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Production volume configuration with explicit drivers
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/icon-ruc/data/postgres
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/icon-ruc/data/redis
  app_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/icon-ruc/data/app
  app_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/icon-ruc/logs
  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/icon-ruc/data/prometheus
  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/icon-ruc/data/grafana
  loki_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/icon-ruc/data/loki