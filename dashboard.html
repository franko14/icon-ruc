<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ICON-D2-RUC-EPS · Bratislava</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
<style>
:root{
  --bg:#0b0d10;
  --panel:#14171c;
  --panel-2:#191d24;
  --line:#232830;
  --line-2:#2e3440;
  --text:#e6eaf2;
  --text-dim:#b1b8c5;
  --muted:#7f8796;
  --muted-2:#5b6270;

  --precip:#d4a656;
  --precip-2:rgba(212,166,86,0.55);
  --precip-3:rgba(212,166,86,0.45);
  --precip-4:rgba(212,166,86,0.22);

  --wind:#6b94a8;
  --wind-2:rgba(107,148,168,0.55);
  --wind-3:rgba(107,148,168,0.45);
  --wind-4:rgba(107,148,168,0.22);

  --bad:#d96c6c;
  --good:#7eb580;
  --warn:#e0a55c;

  --font-display:"Instrument Serif", "Iowan Old Style", serif;
  --font-data:"IBM Plex Mono", ui-monospace, Menlo, monospace;
  --font-ui:"IBM Plex Mono", ui-monospace, Menlo, monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:var(--font-ui);font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;font-feature-settings:"ss01","cv11";
}
body{background:
  radial-gradient(1200px 600px at 10% -10%, rgba(212,166,86,0.04), transparent 60%),
  radial-gradient(1000px 500px at 110% 10%, rgba(107,148,168,0.04), transparent 60%),
  var(--bg);
  min-height:100vh;
}
a{color:var(--text);text-decoration:none}

.page{max-width:1280px;margin:0 auto;padding:40px 32px 56px}

/* ── Header ─────────────────────────────────────────────── */
.header{
  display:flex;align-items:flex-end;justify-content:space-between;gap:24px;
  padding-bottom:20px;margin-bottom:32px;
  border-bottom:1px solid var(--line);
  flex-wrap:wrap;
}
.brand{display:flex;flex-direction:column;gap:2px}
.brand-eyebrow{
  font-family:var(--font-data);font-size:10.5px;letter-spacing:0.18em;
  color:var(--muted);text-transform:uppercase;font-weight:500;
}
.brand-title{
  font-family:var(--font-display);font-size:36px;line-height:1;
  font-style:italic;font-weight:400;letter-spacing:-0.01em;
}
.brand-title .loc{color:var(--text-dim);font-style:normal;font-weight:400}
.brand-sub{
  font-family:var(--font-data);font-size:11px;color:var(--muted-2);
  margin-top:6px;letter-spacing:0.02em;
}

.header-meta{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.run-picker{display:flex;align-items:center;gap:10px}
.run-picker label{
  font-family:var(--font-data);font-size:10px;letter-spacing:0.16em;
  color:var(--muted);text-transform:uppercase;
}
.run-picker select{
  background:var(--panel);color:var(--text);
  border:1px solid var(--line-2);border-radius:2px;
  padding:7px 10px;font-family:var(--font-data);font-size:12px;
  cursor:pointer;
  appearance:none;-webkit-appearance:none;
  padding-right:28px;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8' fill='none' stroke='%237f8796' stroke-width='1.5'><path d='M2 2l4 4 4-4'/></svg>");
  background-repeat:no-repeat;background-position:right 9px center;background-size:9px;
}
.run-picker select:hover{border-color:var(--muted)}
.age{font-family:var(--font-data);font-size:11px;color:var(--muted)}

/* ── Summary strip ──────────────────────────────────────── */
.summary{
  display:grid;grid-template-columns:1fr 1fr;gap:1px;
  background:var(--line);border:1px solid var(--line);border-radius:3px;
  margin-bottom:48px;overflow:hidden;
}
.sum-cell{background:var(--panel);padding:22px 24px;position:relative}
.sum-cell[data-var="TOT_PREC"]{border-top:2px solid var(--precip)}
.sum-cell[data-var="VMAX_10M"]{border-top:2px solid var(--wind)}
.sum-label{
  font-family:var(--font-data);font-size:10.5px;letter-spacing:0.18em;
  color:var(--muted);text-transform:uppercase;margin-bottom:14px;
}
.sum-main{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.sum-value{
  font-family:var(--font-display);font-style:italic;
  font-size:58px;line-height:0.95;font-weight:400;
  letter-spacing:-0.02em;
}
.sum-unit{
  font-family:var(--font-ui);font-size:13px;color:var(--muted);
  font-weight:500;
}
.sum-sub{
  font-family:var(--font-data);font-size:11px;color:var(--text-dim);
  margin-top:14px;display:flex;gap:18px;flex-wrap:wrap;
}
.sum-sub b{color:var(--text);font-weight:500}
.spark{margin-top:14px;height:34px}

/* ── Chart block ────────────────────────────────────────── */
.block{margin-bottom:56px}
.block-head{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:24px;margin-bottom:14px;flex-wrap:wrap;
}
.block-title{display:flex;align-items:baseline;gap:14px}
.block-title h2{
  font-family:var(--font-display);font-style:italic;
  margin:0;font-size:30px;font-weight:400;letter-spacing:-0.01em;
}
.block-title .accent-dot{width:6px;height:6px;border-radius:1px;display:inline-block}
.block-title[data-var="TOT_PREC"] .accent-dot{background:var(--precip)}
.block-title[data-var="VMAX_10M"] .accent-dot{background:var(--wind)}
.block-desc{
  font-family:var(--font-data);font-size:11px;color:var(--muted);
  margin-top:4px;letter-spacing:0.02em;
}

.controls{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.ctrl{display:flex;align-items:center;gap:8px}
.ctrl-label{
  font-family:var(--font-data);font-size:10px;letter-spacing:0.14em;
  text-transform:uppercase;color:var(--muted);
}
.seg{
  display:flex;background:var(--panel);border:1px solid var(--line-2);
  border-radius:2px;overflow:hidden;
}
.seg button{
  font-family:var(--font-data);font-size:11px;
  background:transparent;color:var(--muted);border:0;
  padding:6px 10px;cursor:pointer;
  border-right:1px solid var(--line-2);
  transition:all 120ms ease;
  letter-spacing:0.02em;
}
.seg button:last-child{border-right:0}
.seg button:hover{color:var(--text-dim);background:var(--panel-2)}
.seg button.active{background:var(--text);color:var(--bg);font-weight:600}
.seg[data-accent="precip"] button.active{background:var(--precip);color:var(--bg)}
.seg[data-accent="wind"] button.active{background:var(--wind);color:var(--bg)}

.chart-wrap{
  background:var(--panel);border:1px solid var(--line);border-radius:3px;
  padding:14px 14px 10px;position:relative;overflow:hidden;
}
.chart-wrap::before{
  content:"";position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent, var(--line-2), transparent);
}
.chart{height:340px}
.readout{
  display:flex;gap:24px;flex-wrap:wrap;padding:12px 16px 10px;
  border-top:1px solid var(--line);margin:12px -14px -10px;
  font-family:var(--font-data);font-size:11px;color:var(--text-dim);
  min-height:40px;
}
.readout .time{color:var(--muted);letter-spacing:0.04em;margin-right:4px}
.readout .key{color:var(--muted);margin-right:3px}
.readout .val{color:var(--text);font-weight:500}
.readout .sep{color:var(--muted-2);margin:0 6px}

.legend{
  display:flex;gap:22px;flex-wrap:wrap;margin-top:14px;
  font-family:var(--font-data);font-size:10.5px;color:var(--muted);
  letter-spacing:0.04em;
}
.legend .sw{display:inline-block;width:22px;height:8px;margin-right:6px;vertical-align:middle;border-radius:1px}
.legend[data-var="TOT_PREC"] .sw.outer{background:var(--precip-4)}
.legend[data-var="TOT_PREC"] .sw.inner{background:var(--precip-3)}
.legend[data-var="TOT_PREC"] .sw.median{background:var(--precip)}
.legend[data-var="VMAX_10M"] .sw.outer{background:var(--wind-4)}
.legend[data-var="VMAX_10M"] .sw.inner{background:var(--wind-3)}
.legend[data-var="VMAX_10M"] .sw.median{background:var(--wind)}
.legend .sw.threshold{background:var(--bad);height:2px;margin-bottom:3px}

/* ── Footer ─────────────────────────────────────────────── */
.footer{
  margin-top:56px;padding-top:18px;border-top:1px solid var(--line);
  display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;
  font-family:var(--font-data);font-size:10.5px;color:var(--muted-2);
  letter-spacing:0.04em;
}
.footer .dot{color:var(--muted-2);margin:0 8px}

/* ── States ─────────────────────────────────────────────── */
.err{
  background:rgba(217,108,108,0.06);border:1px solid rgba(217,108,108,0.4);
  color:var(--bad);padding:14px 18px;border-radius:3px;
  font-family:var(--font-data);font-size:12px;margin-bottom:24px;
}
.empty{
  color:var(--muted);font-family:var(--font-data);font-size:11px;
  padding:60px 0;text-align:center;letter-spacing:0.04em;
}

/* ── uPlot overrides ────────────────────────────────────── */
.uplot{background:transparent;color:var(--text)}
.u-axis text{fill:var(--muted)!important}
.u-axis .u-label{font-family:var(--font-data);font-size:10px;letter-spacing:0.08em}
.u-select{background:rgba(230,234,242,0.04)!important}
.u-cursor-x,.u-cursor-y{background:var(--line-2)!important}

@media (max-width:720px){
  .page{padding:24px 18px}
  .brand-title{font-size:30px}
  .sum-value{font-size:42px}
  .block-title h2{font-size:24px}
  .summary{grid-template-columns:1fr}
  .chart{height:260px}
}
</style>
</head>
<body>
<div class="page">
  <header class="header">
    <div class="brand">
      <div class="brand-eyebrow">ICON-D2-RUC-EPS · DWD</div>
      <div class="brand-title"><em>Bratislava</em> <span class="loc">/ 48.15°N 17.11°E</span></div>
      <div class="brand-sub" id="brandSub"></div>
    </div>
    <div class="header-meta">
      <div class="run-picker">
        <label for="runSelect">forecast run</label>
        <select id="runSelect"></select>
      </div>
      <div class="age" id="age"></div>
    </div>
  </header>

  <div id="err" class="err" style="display:none"></div>
  <div class="summary" id="summary"></div>
  <div id="charts"></div>

  <footer class="footer">
    <span id="footerLeft">model: ICON-D2-RUC-EPS · 20-member ensemble</span>
    <span id="footerRight"></span>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
<script>
(() => {
const $ = (id) => document.getElementById(id);
const fmtTime = (t) => new Date(t).toLocaleString([], {
  month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'
});
const fmtRunLabel = (id) => {
  // 2025-10-28T0700 → "28 Oct · 07:00 UTC"
  const date = id.slice(0,10);
  const hm = id.slice(11);
  const d = new Date(date + 'T00:00:00Z');
  const m = d.toLocaleDateString('en', {month:'short', day:'numeric'});
  return `${m} · ${hm.slice(0,2)}:${hm.slice(2)} UTC`;
};
const fmtNum = (v, digits=1) => (v == null || Number.isNaN(v)) ? '–' : Number(v).toFixed(digits);
const fmtAge = (iso) => {
  if (!iso) return '';
  const mins = Math.max(0, Math.floor((Date.now() - new Date(iso).getTime()) / 60000));
  if (mins < 60) return `updated ${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 48) return `updated ${hrs}h ago`;
  return `updated ${Math.floor(hrs/24)}d ago`;
};

const VAR_META = {
  TOT_PREC: {
    label:'Precipitation', short:'precip', accent:'precip',
    desc:'Ground-level precipitation rate, deaccumulated from model output',
    unitShort:(u) => u.replace('/h',''),
    isRate:true,
  },
  VMAX_10M: {
    label:'Wind Gust', short:'wind', accent:'wind',
    desc:'Maximum instantaneous wind gust at 10 m above ground',
    unitShort:(u) => u,
    isRate:false,
  },
};

const TIME_RANGES = [
  {key:'6h', label:'6H', hours:6},
  {key:'12h', label:'12H', hours:12},
  {key:'24h', label:'24H', hours:24},
  {key:'all', label:'ALL', hours:Infinity},
];
const SPREADS = [
  {key:'wide', label:'P10–90', pairs:[['p10','p90'],['p25','p75']]},
  {key:'inner', label:'P25–75', pairs:[['p25','p75']]},
  {key:'median', label:'P50', pairs:[]},
];

const state = {
  runs: [],
  current: null,
  data: null,
  controls: {},        // { TOT_PREC: {range, spread, threshold}, VMAX_10M: {...} }
};

const plots = {};      // varName -> uPlot instance
const readouts = {};   // varName -> readout DOM element

async function fetchJSON(url){
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${url}: ${r.status}`);
  return r.json();
}

function showError(msg){
  const el = $('err'); el.style.display = 'block'; el.textContent = msg;
}
function clearError(){ $('err').style.display = 'none'; }

function parseTimes(times){ return times.map(t => new Date(t).getTime()); }

function sliceByRange(times, values, hours){
  if (hours === Infinity) return {times, values};
  const start = times[0];
  const end = start + hours * 3600 * 1000;
  const t = [], v = [];
  for (let i = 0; i < times.length; i++) {
    if (times[i] <= end) { t.push(times[i]); v.push(values[i]); }
  }
  return {times:t, values:v};
}

// ── summary cards ───────────────────────────────────────
function renderSummary(data){
  const sum = $('summary');
  sum.innerHTML = '';
  for (const [varName, meta] of Object.entries(VAR_META)){
    const vd = data.variables[varName];
    const cell = document.createElement('div');
    cell.className = 'sum-cell';
    cell.dataset.var = varName;

    if (!vd || !vd.times.length){
      cell.innerHTML = `
        <div class="sum-label">${meta.label} · next 24h</div>
        <div class="sum-main"><div class="sum-value">–</div></div>
        <div class="sum-sub"><span>no data</span></div>
      `;
      sum.appendChild(cell); continue;
    }

    const times = parseTimes(vd.times);
    const p50 = vd.percentiles.p50;
    const p90 = vd.percentiles.p90;
    const {times:t24, values:m24} = sliceByRange(times, p50, 24);
    const {values:p90_24} = sliceByRange(times, p90, 24);
    const peakP50 = m24.length ? Math.max(...m24) : null;
    const peakP90 = p90_24.length ? Math.max(...p90_24) : null;

    let headline, headlineUnit, hint;
    if (meta.isRate){
      const stepHrs = times.length > 1 ? (times[1] - times[0]) / 3600000 : 1;
      const totalMedian = m24.reduce((s, v) => s + (v || 0), 0) * stepHrs;
      headline = fmtNum(totalMedian, 1);
      headlineUnit = 'mm total · median';
      hint = `peak rate <b>${fmtNum(peakP50, 2)}</b> ${vd.unit}`;
    } else {
      headline = fmtNum(peakP50, 1);
      headlineUnit = `${vd.unit} · peak median`;
      hint = `median ${fmtNum(m24.length ? m24.reduce((a,b)=>a+b,0)/m24.length : NaN, 1)} ${vd.unit}`;
    }

    cell.innerHTML = `
      <div class="sum-label">${meta.label} · next 24h</div>
      <div class="sum-main">
        <div class="sum-value">${headline}</div>
        <div class="sum-unit">${headlineUnit}</div>
      </div>
      <div class="sum-sub">
        <span>${hint}</span>
        <span><b>p90</b> peak ${fmtNum(peakP90, 1)} ${vd.unit}</span>
        <span><b>${p50.length}</b> steps</span>
      </div>
      <div class="spark" id="spark-${varName}"></div>
    `;
    sum.appendChild(cell);

    // Sparkline — tiny band
    requestAnimationFrame(() => {
      const el = cell.querySelector('.spark');
      const W = el.clientWidth || 260;
      const {times:ts, values:p10v} = sliceByRange(times, vd.percentiles.p10, 24);
      const {values:p90v} = sliceByRange(times, vd.percentiles.p90, 24);
      const {values:p50v} = sliceByRange(times, vd.percentiles.p50, 24);
      const tsSec = ts.map(t => t/1000);
      const accent = meta.accent === 'precip' ? '#d4a656' : '#6b94a8';
      const accent4 = meta.accent === 'precip' ? 'rgba(212,166,86,0.2)' : 'rgba(107,148,168,0.2)';
      const opts = {
        width:W, height:34,
        cursor:{show:false}, legend:{show:false}, select:{show:false},
        scales:{x:{time:true}, y:{auto:true, range:(u,min,max) => [0, max]}},
        axes:[{show:false},{show:false}],
        series:[
          {}, {fill:accent4, stroke:'transparent', points:{show:false}, band:true},
          {fill:accent4, stroke:'transparent', points:{show:false}},
          {stroke:accent, width:1.25, points:{show:false}},
        ],
        bands:[{series:[1,2], fill:accent4}],
        padding:[0,0,0,0],
      };
      new uPlot(opts, [tsSec, p10v, p90v, p50v], el);
    });
  }
}

// ── controls ───────────────────────────────────────────
function ensureControls(varName, vd){
  if (state.controls[varName]) return;
  const thresholds = Object.keys(vd.probability_exceeds || {});
  state.controls[varName] = {
    range: '24h',
    spread: 'wide',
    threshold: thresholds[0] || null,   // selected threshold (string)
  };
}

function makeSegControl(label, options, accent, activeKey, onChange){
  const el = document.createElement('div');
  el.className = 'ctrl';
  el.innerHTML = `<span class="ctrl-label">${label}</span>`;
  const seg = document.createElement('div');
  seg.className = 'seg';
  seg.dataset.accent = accent;
  options.forEach(opt => {
    const b = document.createElement('button');
    b.textContent = opt.label;
    b.dataset.key = opt.key;
    if (opt.key === activeKey) b.classList.add('active');
    b.addEventListener('click', () => {
      seg.querySelectorAll('button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      onChange(opt.key);
    });
    seg.appendChild(b);
  });
  el.appendChild(seg);
  return el;
}

// ── chart block ────────────────────────────────────────
function renderBlock(parent, varName, data){
  const meta = VAR_META[varName];
  const vd = data.variables[varName];
  const block = document.createElement('section');
  block.className = 'block';
  block.innerHTML = `
    <div class="block-head">
      <div>
        <div class="block-title" data-var="${varName}">
          <span class="accent-dot"></span>
          <h2>${meta.label}</h2>
        </div>
        <div class="block-desc">${meta.desc}</div>
      </div>
      <div class="controls" id="ctrl-${varName}"></div>
    </div>
    <div class="chart-wrap">
      <div class="chart" id="chart-${varName}"></div>
      <div class="readout" id="readout-${varName}"></div>
    </div>
    <div class="legend" data-var="${varName}" id="legend-${varName}"></div>
  `;
  parent.appendChild(block);

  if (!vd || !vd.times.length){
    block.querySelector('.chart').innerHTML = '<div class="empty">no data for this variable</div>';
    return;
  }

  ensureControls(varName, vd);
  renderControls(varName, vd);
  readouts[varName] = block.querySelector('.readout');
  renderLegend(varName, vd);
  drawChart(varName, vd);
}

function renderControls(varName, vd){
  const c = $(`ctrl-${varName}`);
  c.innerHTML = '';
  const accent = VAR_META[varName].accent;
  const cur = state.controls[varName];

  c.appendChild(makeSegControl('Time', TIME_RANGES, accent, cur.range, (k) => {
    cur.range = k; drawChart(varName, vd);
  }));
  c.appendChild(makeSegControl('Spread', SPREADS, accent, cur.spread, (k) => {
    cur.spread = k; drawChart(varName, vd);
  }));
  const thresholds = Object.keys(vd.probability_exceeds || {});
  if (thresholds.length){
    const opts = thresholds.map(t => ({
      key:t, label:`≥${Number(t).toFixed(Number(t)<1?1:0)}`
    }));
    c.appendChild(makeSegControl('Threshold', opts, accent, cur.threshold, (k) => {
      cur.threshold = k; drawChart(varName, vd);
    }));
  }
}

function renderLegend(varName, vd){
  const l = $(`legend-${varName}`);
  const cur = state.controls[varName];
  const spread = SPREADS.find(s => s.key === cur.spread);
  let html = '';
  if (cur.spread === 'wide'){
    html += `<span><span class="sw outer"></span>P10–P90 range</span>`;
    html += `<span><span class="sw inner"></span>P25–P75 interquartile</span>`;
  } else if (cur.spread === 'inner'){
    html += `<span><span class="sw inner"></span>P25–P75 interquartile</span>`;
  }
  html += `<span><span class="sw median"></span>P50 median</span>`;
  if (cur.threshold){
    html += `<span><span class="sw threshold"></span>threshold ≥${cur.threshold} ${vd.unit}</span>`;
  }
  l.innerHTML = html;
}

// ── uPlot chart ────────────────────────────────────────
function drawChart(varName, vd){
  const el = $(`chart-${varName}`);
  el.innerHTML = '';
  const cur = state.controls[varName];
  const meta = VAR_META[varName];
  const range = TIME_RANGES.find(r => r.key === cur.range);

  const times = parseTimes(vd.times);
  const sliced = {};
  for (const pct of ['p10','p25','p50','p75','p90']){
    sliced[pct] = sliceByRange(times, vd.percentiles[pct], range.hours).values;
  }
  const t = sliceByRange(times, vd.percentiles.p50, range.hours).times.map(ms => ms/1000);

  const accent = meta.accent === 'precip' ? '#d4a656' : '#6b94a8';
  const outer4 = meta.accent === 'precip' ? 'rgba(212,166,86,0.22)' : 'rgba(107,148,168,0.22)';
  const inner3 = meta.accent === 'precip' ? 'rgba(212,166,86,0.45)' : 'rgba(107,148,168,0.45)';
  const edge   = meta.accent === 'precip' ? 'rgba(212,166,86,0.35)' : 'rgba(107,148,168,0.35)';
  const glow   = meta.accent === 'precip' ? 'rgba(212,166,86,0.25)' : 'rgba(107,148,168,0.25)';

  // Data layout: [times, p10, p90, p25, p75, p50]
  const data = [t, sliced.p10, sliced.p90, sliced.p25, sliced.p75, sliced.p50];

  const series = [
    {},
    {stroke:edge, width:1, dash:[3,3], points:{show:false}, label:'p10', show: cur.spread === 'wide'},
    {stroke:edge, width:1, dash:[3,3], points:{show:false}, label:'p90', show: cur.spread === 'wide'},
    {stroke:edge, width:1, dash:[2,2], points:{show:false}, label:'p25', show: cur.spread !== 'median'},
    {stroke:edge, width:1, dash:[2,2], points:{show:false}, label:'p75', show: cur.spread !== 'median'},
    {stroke:accent, width:2.0, points:{show:false}, label:'p50'},
  ];

  const bands = [];
  if (cur.spread === 'wide') bands.push({series:[1,2], fill:outer4});
  if (cur.spread !== 'median') bands.push({series:[3,4], fill:inner3});

  // Threshold horizontal line — drawn via custom hook
  const thresholdVal = cur.threshold ? Number(cur.threshold) : null;
  const probs = vd.probability_exceeds || {};
  const probSeries = cur.threshold ? sliceByRange(times, probs[cur.threshold] || [], range.hours).values : null;

  const opts = {
    width: el.clientWidth || 900,
    height: 340,
    padding: [14, 10, 10, 10],
    scales: {
      x:{time:true},
      y:{auto:true, range:(u, dmin, dmax) => {
        const top = Math.max(dmax, thresholdVal || 0);
        return [0, top * 1.05 + 0.001];
      }},
    },
    axes: [
      {
        stroke:'#7f8796',
        grid:{stroke:'rgba(255,255,255,0.04)', width:1},
        ticks:{stroke:'#2e3440', width:1, size:4},
        font:'10px "IBM Plex Mono", monospace',
        values:(u, vals) => vals.map(v => {
          const d = new Date(v*1000);
          return d.toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}).replace(',','');
        }),
      },
      {
        stroke:'#7f8796',
        grid:{stroke:'rgba(255,255,255,0.04)', width:1},
        ticks:{stroke:'#2e3440', width:1, size:4},
        size:64,
        font:'10px "IBM Plex Mono", monospace',
        label:vd.unit,
        labelSize:30,
        labelFont:'10px "IBM Plex Mono", monospace',
        labelGap:6,
      },
    ],
    series, bands,
    legend:{show:false},
    cursor:{
      drag:{setScale:false},
      points:{size:6, stroke:accent, fill:'#0b0d10', width:1.5},
      focus:{prox:18},
      x:true, y:false,
    },
    hooks: {
      draw: [
        (u) => {
          // p50 glow — wider, lower-alpha stroke under the main line
          const xs = u.data[0];
          const ys = u.data[5];
          if (!xs || !ys || !xs.length) return;
          const ctx = u.ctx;
          ctx.save();
          ctx.beginPath();
          ctx.strokeStyle = glow;
          ctx.lineWidth = 5;
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          let started = false;
          for (let i = 0; i < xs.length; i++){
            if (ys[i] == null) { started = false; continue; }
            const x = u.valToPos(xs[i], 'x', true);
            const y = u.valToPos(ys[i], 'y', true);
            if (!started) { ctx.moveTo(x, y); started = true; }
            else { ctx.lineTo(x, y); }
          }
          ctx.stroke();
          ctx.restore();
        },
        (u) => {
          if (thresholdVal == null) return;
          const ctx = u.ctx;
          const yPos = u.valToPos(thresholdVal, 'y', true);
          if (Number.isNaN(yPos)) return;
          ctx.save();
          ctx.beginPath();
          ctx.strokeStyle = 'rgba(217,108,108,0.55)';
          ctx.setLineDash([3,3]);
          ctx.lineWidth = 1;
          ctx.moveTo(u.bbox.left, yPos);
          ctx.lineTo(u.bbox.left + u.bbox.width, yPos);
          ctx.stroke();
          ctx.setLineDash([]);
          // label
          ctx.font = '10px "IBM Plex Mono", monospace';
          ctx.fillStyle = 'rgba(217,108,108,0.9)';
          ctx.textAlign = 'right';
          ctx.fillText(`≥${thresholdVal} ${vd.unit}`, u.bbox.left + u.bbox.width - 4, yPos - 4);
          ctx.restore();
        }
      ],
      setCursor: [
        (u) => {
          const i = u.cursor.idx;
          if (i == null) { renderReadout(varName, null, vd, probSeries); return; }
          const row = {
            time: t[i]*1000,
            p10: sliced.p10[i], p25: sliced.p25[i], p50: sliced.p50[i],
            p75: sliced.p75[i], p90: sliced.p90[i],
            prob: probSeries ? probSeries[i] : null,
          };
          renderReadout(varName, row, vd, probSeries);
        }
      ],
    },
  };

  // Kill previous plot if any
  if (plots[varName]) { try { plots[varName].destroy(); } catch(e){} }
  plots[varName] = new uPlot(opts, data, el);

  renderLegend(varName, vd);
  renderReadout(varName, null, vd, probSeries);
}

function renderReadout(varName, row, vd, probSeries){
  const el = readouts[varName];
  if (!el) return;
  const meta = VAR_META[varName];
  const cur = state.controls[varName];
  if (!row){
    el.innerHTML = `
      <span class="time">hover chart for values</span>
      <span class="sep">·</span>
      <span class="key">spread</span>
      <span class="val">${(SPREADS.find(s=>s.key===cur.spread)||{}).label}</span>
      <span class="sep">·</span>
      <span class="key">window</span>
      <span class="val">${(TIME_RANGES.find(r=>r.key===cur.range)||{}).label}</span>
      ${cur.threshold ? `<span class="sep">·</span><span class="key">threshold</span><span class="val">≥${cur.threshold} ${vd.unit}</span>` : ''}
    `;
    return;
  }
  let html = `<span class="time">${fmtTime(row.time)}</span><span class="sep">·</span>`;
  html += `<span class="key">p50</span><span class="val">${fmtNum(row.p50, 2)} ${vd.unit}</span>`;
  if (cur.spread !== 'median'){
    html += `<span class="sep">·</span><span class="key">p25–p75</span>`;
    html += `<span class="val">${fmtNum(row.p25, 2)} → ${fmtNum(row.p75, 2)}</span>`;
  }
  if (cur.spread === 'wide'){
    html += `<span class="sep">·</span><span class="key">p10–p90</span>`;
    html += `<span class="val">${fmtNum(row.p10, 2)} → ${fmtNum(row.p90, 2)}</span>`;
  }
  if (cur.threshold && row.prob != null){
    const pct = Math.round(row.prob * 100);
    html += `<span class="sep">·</span>`;
    html += `<span class="key">P(≥${cur.threshold})</span><span class="val" style="color:${pct>=50?'var(--warn)':'var(--text)'}">${pct}%</span>`;
  }
  el.innerHTML = html;
}

// ── orchestration ──────────────────────────────────────
async function loadRun(runId){
  clearError();
  try {
    const data = await fetchJSON(`/api/runs/${runId}`);
    state.data = data;
    state.controls = {};    // reset per-run (fresh thresholds may differ)
    $('brandSub').textContent =
      `nearest grid cell ${fmtNum(data.grid_distance_km, 2)} km from target`;
    $('age').textContent = fmtAge(data.generated_at);
    $('footerRight').textContent =
      `run ${fmtRunLabel(runId)} · generated ${data.generated_at}`;

    renderSummary(data);
    const charts = $('charts');
    charts.innerHTML = '';
    for (const varName of Object.keys(VAR_META)){
      renderBlock(charts, varName, data);
    }
  } catch (e) {
    showError(`Failed to load run ${runId}: ${e.message}`);
  }
}

async function init(){
  try {
    const runs = await fetchJSON('/api/runs');
    state.runs = runs;
    if (!runs.length){
      showError('No forecast runs available. Run `python main.py` to generate one.');
      return;
    }
    const sel = $('runSelect');
    sel.innerHTML = runs.map(r => `<option value="${r}">${fmtRunLabel(r)}</option>`).join('');
    sel.value = runs[0];
    sel.addEventListener('change', () => loadRun(sel.value));
    await loadRun(runs[0]);

    // Redraw on resize (debounced)
    let tmo;
    window.addEventListener('resize', () => {
      clearTimeout(tmo);
      tmo = setTimeout(() => {
        if (state.data) {
          for (const varName of Object.keys(VAR_META)){
            const vd = state.data.variables[varName];
            if (vd && vd.times.length) drawChart(varName, vd);
          }
          renderSummary(state.data);
        }
      }, 180);
    });
  } catch (e) {
    showError(`Failed to fetch run list: ${e.message}`);
  }
}

init();
})();
</script>
