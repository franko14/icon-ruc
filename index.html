<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ICON-D2-RUC-EPS · Bratislava</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
<style>
/* ── Unified design tokens ──────────────────────────────
   Palette sourced from imeteo.sk (primary blue #206ff2,
   navy #19222a/#2b4672, sun yellow #ffd92a).
   Strict 5-step type scale and 4px spacing rhythm —
   every visual element composes from these tokens only.
*/
:root{
  /* Surfaces */
  --bg:       #f5f7fa;
  --panel:    #ffffff;
  --panel-2:  #f1f3f7;

  /* Borders (subtle → strong) */
  --line:     #e1e5ec;
  --line-2:   #c9d0db;

  /* Ink ladder — 4 steps, each with clear use */
  --ink:      #19222a;   /* titles, hero numbers, primary text */
  --text:     #2b3440;   /* body copy */
  --muted:    #5e6875;   /* labels, metadata, descriptions */
  --muted-2:  #9aa1ad;   /* tertiary (ticks, separators) */

  /* Brand accents — one base + rgb triplet per variable */
  --precip:#206ff2;   --precip-rgb:32,111,242;
  --wind:  #2b4672;   --wind-rgb:43,70,114;
  --temp:  #e5594a;   --temp-rgb:229,89,74;
  --sun:   #ffd92a;   --sun-ink:#6b5400;

  --bad:#dc3741;  --good:#8dd542;

  /* Typography — 5 sizes, used EVERYWHERE. No ad-hoc values. */
  --font:       "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --fs-xs:      11px;   /* eyebrow, axis ticks, tick labels, micro */
  --fs-sm:      13px;   /* description, metadata, secondary labels */
  --fs-base:    14px;   /* body, readouts, controls, axis numbers */
  --fs-md:      16px;   /* section titles (meteogram, block, evolution) */
  --fs-lg:      22px;   /* page/brand title */

  /* Spacing — 4px rhythm; applied uniformly */
  --s-1:4px; --s-2:8px; --s-3:12px; --s-4:16px;
  --s-5:20px; --s-6:24px; --s-8:32px; --s-10:40px;

  /* Shape */
  --radius:   10px;
  --radius-sm: 6px;
  --radius-xs: 3px;

  /* Elevation */
  --shadow:   0 1px 2px rgba(25,34,42,0.04), 0 2px 12px rgba(25,34,42,0.05);

  /* Derived translucents for bands/legend swatches */
  --precip-band-outer:rgba(32,111,242,0.12);
  --precip-band-inner:rgba(32,111,242,0.30);
  --wind-band-outer:  rgba(43,70,114,0.12);
  --wind-band-inner:  rgba(43,70,114,0.30);
  --temp-band-outer:  rgba(229,89,74,0.12);
  --temp-band-inner:  rgba(229,89,74,0.30);
}
*{box-sizing:border-box}
html,body{
  margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:var(--font);font-size:var(--fs-base);line-height:1.55;
  font-feature-settings:"tnum" 1, "cv02" 1, "cv11" 1;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}
a{color:var(--precip);text-decoration:none}
a:hover{text-decoration:underline}

.page{max-width:1200px;margin:0 auto;padding:var(--s-8) var(--s-6) var(--s-10)}

/* ── Reusable building blocks ──────────────────────────── */
/* One card rule for every boxed surface. */
.card{
  background:var(--panel);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}
/* One header rule for section titles (detail + evolution + meteogram). */
.title{
  font-size:var(--fs-md);
  font-weight:700;
  letter-spacing:-0.01em;
  color:var(--ink);
  margin:0;
}
.title .unit{
  font-size:var(--fs-sm);
  font-weight:500;
  color:var(--muted);
  margin-left:var(--s-2);
  letter-spacing:0;
}
.title-desc{
  font-size:var(--fs-sm);
  color:var(--muted);
  margin-top:2px;
}
/* One UI-label rule (eyebrow, run-picker, ctrl-label). */
.ui-label{
  font-size:var(--fs-xs);
  font-weight:600;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:var(--muted);
}

/* ── Header ─────────────────────────────────────────────── */
.header{
  display:flex;align-items:flex-end;justify-content:space-between;
  gap:var(--s-5);flex-wrap:wrap;
  padding:var(--s-5) var(--s-6);
  margin-bottom:var(--s-6);
  background:var(--ink);color:#fff;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}
.brand{display:flex;flex-direction:column;gap:var(--s-1);color:#fff}
.brand-row{display:flex;align-items:center;gap:var(--s-2)}
.brand-dot{
  display:inline-block;width:12px;height:12px;border-radius:50%;
  background:var(--sun);
  box-shadow:0 0 12px rgba(255,217,42,0.4);
}
.brand-eyebrow{
  font-size:var(--fs-xs);
  font-weight:600;letter-spacing:0.16em;text-transform:uppercase;
  color:rgba(255,255,255,0.65);
}
.brand-title{
  font-size:var(--fs-lg);line-height:1.1;font-weight:700;letter-spacing:-0.015em;
}
.brand-title .loc{
  color:rgba(255,255,255,0.65);
  font-weight:400;margin-left:var(--s-3);font-size:var(--fs-base);
  letter-spacing:0;
}
.brand-sub{
  font-size:var(--fs-sm);color:rgba(255,255,255,0.55);
}

.header-meta{display:flex;flex-direction:column;align-items:flex-end;gap:var(--s-2)}
.run-picker{display:flex;align-items:center;gap:var(--s-2)}
.run-picker label{
  font-size:var(--fs-xs);font-weight:600;
  letter-spacing:0.14em;text-transform:uppercase;
  color:rgba(255,255,255,0.6);
}
.run-picker select{
  background:rgba(255,255,255,0.08);color:#fff;
  border:1px solid rgba(255,255,255,0.18);border-radius:var(--radius-sm);
  padding:7px 32px 7px 12px;
  font-family:var(--font);font-size:var(--fs-sm);font-weight:500;
  cursor:pointer;appearance:none;-webkit-appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8' fill='none' stroke='%23ffffff' stroke-width='1.75'><path d='M2 2l4 4 4-4'/></svg>");
  background-repeat:no-repeat;background-position:right 10px center;background-size:9px;
  transition:background 120ms ease, border-color 120ms ease;
}
.run-picker select:hover{background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.3)}
.age{font-size:var(--fs-xs);color:rgba(255,255,255,0.55);letter-spacing:0.02em}

/* ── Chart block (detail + evolution share this structure) ── */
.block{margin-bottom:var(--s-6)}
.block-head{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:var(--s-4);margin-bottom:var(--s-3);flex-wrap:wrap;
}
.block-title{display:flex;align-items:center;gap:var(--s-2)}
.block-title h2{
  margin:0;font-size:var(--fs-md);font-weight:700;letter-spacing:-0.01em;color:var(--ink);
}
.block-title h2 .unit{
  font-size:var(--fs-sm);font-weight:500;color:var(--muted);margin-left:var(--s-2);
}
.block-title .accent-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.block-title[data-var="TOT_PREC"] .accent-dot{background:var(--precip)}
.block-title[data-var="VMAX_10M"] .accent-dot{background:var(--wind)}
.block-title[data-var="T_2M"]     .accent-dot{background:var(--temp)}
.block-desc{font-size:var(--fs-sm);color:var(--muted);margin-top:2px}

/* Controls (segmented buttons) */
.controls{display:flex;gap:var(--s-3);flex-wrap:wrap;align-items:center}
.ctrl{display:flex;align-items:center;gap:var(--s-2)}
.ctrl-label{
  font-size:var(--fs-xs);font-weight:700;letter-spacing:0.14em;
  text-transform:uppercase;color:var(--muted);
}
.seg{
  display:flex;background:var(--panel-2);border:1px solid var(--line);
  border-radius:var(--radius-sm);padding:2px;gap:2px;
}
.seg button{
  font-family:var(--font);font-size:var(--fs-xs);font-weight:600;
  background:transparent;color:var(--muted);border:0;
  padding:5px 10px;cursor:pointer;border-radius:var(--radius-xs);
  transition:all 120ms ease;letter-spacing:0.02em;
}
.seg button:hover{color:var(--ink);background:rgba(25,34,42,0.04)}
.seg button.active{background:var(--ink);color:#fff}
.seg[data-accent="precip"] button.active{background:var(--precip);color:#fff}
.seg[data-accent="wind"]   button.active{background:var(--wind);  color:#fff}
.seg[data-accent="temp"]   button.active{background:var(--temp);  color:#fff}

/* Chart container — same for detail + evolution */
.chart-wrap{
  background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:var(--s-4);position:relative;overflow:hidden;
}
.chart-scroll{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch}
.chart-scroll::-webkit-scrollbar{height:6px}
.chart-scroll::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:3px}
.chart-scroll::-webkit-scrollbar-track{background:transparent}
/* Always render full forecast at readable density; scroll when viewport is narrower. */
.chart{height:340px;min-width:720px}

/* Hover readout row under each chart */
.readout{
  display:flex;gap:var(--s-5);flex-wrap:wrap;
  padding:var(--s-3) var(--s-4);
  margin:var(--s-3) calc(-1 * var(--s-4)) calc(-1 * var(--s-4));
  border-top:1px solid var(--line);
  background:var(--bg);
  border-radius:0 0 var(--radius) var(--radius);
  font-size:var(--fs-sm);color:var(--text);
  min-height:44px;
}
.readout .time{color:var(--muted);font-weight:600;margin-right:var(--s-1)}
.readout .key{color:var(--muted);margin-right:var(--s-1)}
.readout .val{color:var(--ink);font-weight:600}
.readout .sep{color:var(--muted-2);margin:0 var(--s-1)}

/* Legend under detail charts */
.legend{
  display:flex;gap:var(--s-5);flex-wrap:wrap;margin-top:var(--s-3);padding:0 var(--s-1);
  font-size:var(--fs-xs);color:var(--muted);letter-spacing:0.02em;
}
.legend .sw{
  display:inline-block;width:22px;height:8px;margin-right:var(--s-1);
  vertical-align:middle;border-radius:2px;
}
.legend[data-var="TOT_PREC"] .sw.outer{background:var(--precip-band-outer)}
.legend[data-var="TOT_PREC"] .sw.inner{background:var(--precip-band-inner)}
.legend[data-var="TOT_PREC"] .sw.median{background:var(--precip)}
.legend[data-var="VMAX_10M"] .sw.outer{background:var(--wind-band-outer)}
.legend[data-var="VMAX_10M"] .sw.inner{background:var(--wind-band-inner)}
.legend[data-var="VMAX_10M"] .sw.median{background:var(--wind)}
.legend[data-var="T_2M"]     .sw.outer{background:var(--temp-band-outer)}
.legend[data-var="T_2M"]     .sw.inner{background:var(--temp-band-inner)}
.legend[data-var="T_2M"]     .sw.median{background:var(--temp)}
.legend .sw.threshold{background:var(--sun);height:2px;margin-bottom:3px;box-shadow:0 0 6px rgba(255,217,42,0.5)}

/* ── Meteogram ─────────────────────────────────────────── */
.meteogram{
  background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:var(--s-4) var(--s-4) var(--s-2);
  margin-bottom:var(--s-6);overflow:hidden;
}
.mg-head{
  display:flex;align-items:baseline;justify-content:space-between;
  gap:var(--s-4);margin-bottom:var(--s-3);flex-wrap:wrap;
}
.mg-head h2{
  margin:0;font-size:var(--fs-md);font-weight:700;letter-spacing:-0.01em;color:var(--ink);
}
.mg-head .desc{font-size:var(--fs-sm);color:var(--muted)}
.mg-scroll{
  overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;
  margin:0 calc(-1 * var(--s-2));padding:0 var(--s-2);
}
.mg-scroll::-webkit-scrollbar{height:6px}
.mg-scroll::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:3px}
.mg-scroll::-webkit-scrollbar-track{background:transparent}
.mg-stack{min-width:720px}
.mg-panel{padding:var(--s-1) 0 var(--s-1)}
.mg-panel + .mg-panel{border-top:1px solid var(--line)}
.mg-panel .mg-label{
  display:flex;align-items:baseline;gap:var(--s-2);
  padding:var(--s-1) 0 var(--s-1) 2px;
  font-size:var(--fs-xs);font-weight:700;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--muted);
}
.mg-panel .mg-label .unit{
  color:var(--muted-2);font-weight:500;letter-spacing:0.02em;text-transform:none;
  font-size:var(--fs-xs);
}
.mg-panel .mg-chart{width:100%}
/* Shared readout styling with detail charts — tinted background + inset from card edges. */
.mg-readout{
  display:flex;gap:var(--s-4);flex-wrap:wrap;
  padding:var(--s-3) var(--s-4);
  margin:var(--s-3) calc(-1 * var(--s-4)) calc(-1 * var(--s-2));
  border-top:1px solid var(--line);
  background:var(--bg);
  border-radius:0 0 var(--radius) var(--radius);
  font-size:var(--fs-sm);color:var(--text);
  min-height:44px;
}
.mg-readout .time{color:var(--muted);font-weight:600;margin-right:var(--s-1)}
.mg-readout .chip-val{color:var(--ink);font-weight:600}
.mg-readout .sep{color:var(--muted-2);margin:0 var(--s-1)}

/* ── Evolution section ──────────────────────────────────── */
.evolution-head{
  display:flex;align-items:flex-end;justify-content:space-between;
  gap:var(--s-4);padding-top:var(--s-5);margin-bottom:var(--s-4);
  border-top:1px solid var(--line);flex-wrap:wrap;
}
.evolution-head .title{
  font-size:var(--fs-md);font-weight:700;letter-spacing:-0.01em;color:var(--ink);
}
.evolution-head .desc{font-size:var(--fs-sm);color:var(--muted);margin-top:2px}

.run-chips{display:flex;gap:var(--s-1);flex-wrap:wrap;margin-bottom:var(--s-4)}
.chip{
  display:inline-flex;align-items:center;gap:var(--s-2);
  font-family:var(--font);font-size:var(--fs-xs);font-weight:600;
  padding:5px 10px;
  background:var(--panel);border:1px solid var(--line);
  color:var(--muted);border-radius:999px;cursor:pointer;
  transition:all 120ms ease;
}
.chip:hover{color:var(--ink);border-color:var(--line-2)}
.chip .chip-dot{width:8px;height:8px;border-radius:50%;background:var(--line-2);display:inline-block;flex:none}
.chip.active{color:var(--ink)}
.chip.active[data-accent="precip"]{border-color:var(--precip);background:rgba(32,111,242,0.05)}
.chip.active[data-accent="wind"]  {border-color:var(--wind);  background:rgba(43,70,114,0.05)}
.chip.active[data-accent="temp"]  {border-color:var(--temp);  background:rgba(229,89,74,0.05)}
.chip-actions{display:flex;gap:var(--s-1);margin-left:auto}
.chip-action{
  font-family:var(--font);font-size:var(--fs-xs);font-weight:600;
  padding:5px 10px;color:var(--muted);background:var(--panel);
  border:1px solid var(--line);border-radius:var(--radius-sm);cursor:pointer;
  letter-spacing:0.06em;text-transform:uppercase;
  transition:all 120ms ease;
}
.chip-action:hover{color:var(--ink);border-color:var(--line-2)}

/* ── Footer ─────────────────────────────────────────────── */
.footer{
  margin-top:var(--s-8);padding-top:var(--s-4);border-top:1px solid var(--line);
  display:flex;justify-content:space-between;gap:var(--s-4);flex-wrap:wrap;
  font-size:var(--fs-xs);color:var(--muted);letter-spacing:0.02em;
}
.footer a{color:var(--precip);font-weight:500}

/* ── States ─────────────────────────────────────────────── */
.err{
  background:rgba(220,55,65,0.06);border:1px solid rgba(220,55,65,0.35);
  color:var(--bad);padding:var(--s-3) var(--s-4);border-radius:var(--radius-sm);
  font-size:var(--fs-sm);margin-bottom:var(--s-4);
}
.empty{
  color:var(--muted);font-size:var(--fs-sm);
  padding:var(--s-10) 0;text-align:center;letter-spacing:0.02em;
}
.loading{
  color:var(--muted);font-size:var(--fs-xs);padding:var(--s-6) 0;text-align:center;
  letter-spacing:0.12em;text-transform:uppercase;font-weight:600;
}

/* ── uPlot overrides ────────────────────────────────────── */
.uplot{background:transparent;color:var(--ink)}
.u-axis text{fill:var(--text)!important}
.u-axis .u-label{font-size:var(--fs-base);letter-spacing:0.02em;font-weight:700}
.u-select{background:rgba(32,111,242,0.08)!important}
.u-cursor-x,.u-cursor-y{background:var(--line-2)!important}

/* Subtle entrance animation for cards */
@keyframes fadeInUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.header, .meteogram, .block, .evolution-head{animation:fadeInUp 280ms ease both}
.block:nth-of-type(1){animation-delay:40ms}
.block:nth-of-type(2){animation-delay:80ms}
.block:nth-of-type(3){animation-delay:120ms}

/* ── Mobile (≤720px) ───────────────────────────────────── */
@media (max-width:720px){
  .page{padding:var(--s-4) var(--s-3) var(--s-8)}
  .header{
    padding:var(--s-4);flex-direction:column;align-items:flex-start;
    gap:var(--s-3);margin-bottom:var(--s-5);
  }
  .header-meta{align-items:flex-start;width:100%}
  .run-picker{width:100%}
  .run-picker select{flex:1}
  .brand-title .loc{display:block;margin-left:0;margin-top:2px;font-size:var(--fs-sm)}

  .block{margin-bottom:var(--s-5)}
  .block-head{gap:var(--s-2);margin-bottom:var(--s-2)}

  .controls{gap:var(--s-2);width:100%}
  .ctrl{gap:var(--s-1);flex-wrap:wrap}

  .chart-wrap{padding:var(--s-3) var(--s-2);border-radius:var(--radius-sm)}
  .chart-scroll{
    margin:calc(-1 * var(--s-3)) calc(-1 * var(--s-2)) 0;
    padding:var(--s-3) var(--s-2) 0;
    mask-image:linear-gradient(to right, black 0, black calc(100% - 20px), transparent 100%);
    -webkit-mask-image:linear-gradient(to right, black 0, black calc(100% - 20px), transparent 100%);
  }
  .readout{
    padding:var(--s-2) var(--s-3);
    margin:var(--s-2) calc(-1 * var(--s-2)) calc(-1 * var(--s-2));
    gap:var(--s-3);
  }

  .legend{gap:var(--s-3)}
  .legend .sw{width:16px;height:7px}

  .meteogram{padding:var(--s-3) var(--s-3) var(--s-1)}
  .evolution-head{gap:var(--s-2);padding-top:var(--s-4);margin-bottom:var(--s-3)}

  .footer{margin-top:var(--s-5)}
}
</style>
</head>
<body>
<div class="page">
  <header class="header">
    <div class="brand">
      <div class="brand-row">
        <span class="brand-dot" aria-hidden="true"></span>
        <span class="brand-eyebrow">ICON-D2-RUC-EPS · DWD ensemble</span>
      </div>
      <div class="brand-title">Bratislava <span class="loc">48.15°N · 17.11°E</span></div>
      <div class="brand-sub" id="brandSub"></div>
    </div>
    <div class="header-meta">
      <div class="run-picker">
        <label for="runSelect">Forecast run</label>
        <select id="runSelect"></select>
      </div>
      <div class="age" id="age"></div>
    </div>
  </header>

  <div id="err" class="err" style="display:none"></div>
  <div id="meteogram"></div>
  <div id="charts"></div>
  <div id="evolution"></div>

  <footer class="footer">
    <span id="footerLeft">Model: ICON-D2-RUC-EPS · 20-member ensemble · open data from <a href="https://opendata.dwd.de" target="_blank" rel="noopener">DWD</a></span>
    <span id="footerRight"></span>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
<script>
(() => {
const $ = (id) => document.getElementById(id);
const fmtTime = (t) => new Date(t).toLocaleString([], {
  month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'
});
const fmtRunLabel = (id) => {
  const date = id.slice(0,10);
  const hm = id.slice(11);
  const d = new Date(date + 'T00:00:00Z');
  const m = d.toLocaleDateString('en', {month:'short', day:'numeric'});
  return `${m} · ${hm.slice(0,2)}:${hm.slice(2)} UTC`;
};
const fmtRunShort = (id) => {
  const date = id.slice(5,10);
  const hm = id.slice(11);
  return `${date} ${hm.slice(0,2)}:${hm.slice(2)}`;
};
const fmtNum = (v, digits=1) => (v == null || Number.isNaN(v)) ? '–' : Number(v).toFixed(digits);
const fmtAge = (iso) => {
  if (!iso) return '';
  const mins = Math.max(0, Math.floor((Date.now() - new Date(iso).getTime()) / 60000));
  if (mins < 60) return `updated ${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 48) return `updated ${hrs}h ago`;
  return `updated ${Math.floor(hrs/24)}d ago`;
};

// Static-first: fetch JSON directly from data/forecasts/ when served as static files
// (GitHub Pages). Fall back to the Flask API when the static path 404s (local dev).
async function fetchJSON(url){
  const r = await fetch(url, {cache: 'no-store'});
  if (!r.ok) throw new Error(`${url}: ${r.status}`);
  return r.json();
}
async function fetchRuns(){
  try {
    const idx = await fetchJSON('./data/forecasts/index.json');
    return idx.runs || [];
  } catch(e){
    return fetchJSON('/api/runs');
  }
}
async function fetchRun(runId){
  try {
    return await fetchJSON(`./data/forecasts/${runId}.json`);
  } catch(e){
    return fetchJSON(`/api/runs/${runId}`);
  }
}
function showError(msg){ $('err').style.display = 'block'; $('err').textContent = msg; }
function clearError(){ $('err').style.display = 'none'; }
function parseTimes(times){ return times.map(t => new Date(t).getTime()); }

function sliceByRange(times, values, hours){
  if (hours === Infinity) return {times, values};
  const end = times[0] + hours * 3600 * 1000;
  const t = [], v = [];
  for (let i = 0; i < times.length; i++) {
    if (times[i] <= end) { t.push(times[i]); v.push(values[i]); }
  }
  return {times:t, values:v};
}

// ── shared axis helpers (one visual language across all charts) ──
// 3-hourly vertical grid aligned to 00/03/06/09/12/15/18/21 UTC.
const threeHourSplits = (u, axisIdx, scaleMin, scaleMax) => {
  const step = 3 * 3600;
  const start = Math.ceil(scaleMin / step) * step;
  const out = [];
  for (let t = start; t <= scaleMax; t += step) out.push(t);
  return out;
};
// "Apr 19 16:00" on first tick of each visible day, "16:00" after.
const timeLabels = (u, vals) => {
  const seenDays = new Set();
  return vals.map(v => {
    const d = new Date(v*1000);
    const day = d.toLocaleDateString([], {month:'short', day:'numeric'});
    const hm  = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false});
    if (!seenDays.has(day)){ seenDays.add(day); return `${day} ${hm}`; }
    return hm;
  });
};
// Pull palette from CSS custom properties so canvas drawings stay in lock-step
// with the DOM's color system. Single source of truth: :root tokens.
const cssVar = (name) =>
  getComputedStyle(document.documentElement).getPropertyValue(name).trim() || null;
const GRID_X = 'rgba(25,34,42,0.09)';   // 3-hour anchors — stronger
const GRID_Y = 'rgba(25,34,42,0.06)';   // minor horizontal divisions
const AXIS_STROKE = cssVar('--text')   || '#2b3440';
const TICK_STROKE = cssVar('--line-2') || '#c9d0db';

// ── meteogram (compact multi-panel overview) ──────────
function renderMeteogram(data){
  const root = $('meteogram');
  root.innerHTML = '';
  const T = data.variables.T_2M;
  const P = data.variables.TOT_PREC;
  const W = data.variables.VMAX_10M;
  if (!T && !P && !W){ return; }

  const section = document.createElement('section');
  section.className = 'meteogram';
  section.innerHTML = `
    <div class="mg-head">
      <h2>Meteogram · next ${Math.round(mgHours(data))}h</h2>
      <div class="desc">Ensemble median p50 · hover or tap to read values at any time</div>
    </div>
    <div class="mg-scroll">
      <div class="mg-stack">
        <div class="mg-panel"><div class="mg-label">Temperature <span class="unit">°C</span></div><div class="mg-chart" id="mg-temp"></div></div>
        <div class="mg-panel"><div class="mg-label">Precipitation <span class="unit">mm/h</span></div><div class="mg-chart" id="mg-prec"></div></div>
        <div class="mg-panel"><div class="mg-label">Rain probability <span class="unit">P(≥0.1 mm/h)</span></div><div class="mg-chart" id="mg-prob"></div></div>
        <div class="mg-panel"><div class="mg-label">Wind gust <span class="unit">m/s</span></div><div class="mg-chart" id="mg-wind"></div></div>
      </div>
    </div>
    <div class="mg-readout" id="mg-readout"></div>
  `;
  root.appendChild(section);

  const syncKey = 'meteogram-' + data.run_id;
  const readout = section.querySelector('#mg-readout');
  const stash = {};    // keep last cursor values per panel for readout

  const times = parseTimes((P && P.times.length ? P : (T || W)).times);
  const xMin = times[0] / 1000;
  const xMax = times[times.length-1] / 1000;

  function commonAxes(showX, yOpts = {}){
    return [
      {
        show: true,
        stroke: showX ? AXIS_STROKE : 'transparent',
        grid:{show:true, stroke:GRID_X, width:1},
        ticks:{show:showX, stroke:TICK_STROKE, width:1, size:5},
        font:'500 12px Inter, sans-serif',
        size: showX ? 36 : 0,
        space: 85,
        splits: threeHourSplits,
        values: showX ? timeLabels : (u, vals) => vals.map(() => ''),
      },
      {
        stroke:AXIS_STROKE,
        grid:{show:true, stroke:GRID_Y, width:1},
        ticks:{stroke:TICK_STROKE, width:1, size:3},
        font:'500 11px Inter, sans-serif',
        size:46,
        space: yOpts.space ?? 20,
        ...(yOpts.splits ? {splits: yOpts.splits} : {}),
        ...(yOpts.values ? {values: yOpts.values} : {}),
      },
    ];
  }

  function setReadout(){
    const parts = [];
    if (stash.time != null) parts.push(`<span class="time">${fmtTime(stash.time)}</span>`);
    if (stash.temp != null) parts.push(`<span class="chip-val">${fmtNum(stash.temp,1)} °C</span>`);
    if (stash.prec != null) parts.push(`<span class="chip-val">${fmtNum(stash.prec,2)} mm/h</span>`);
    if (stash.prob != null) parts.push(`<span class="chip-val">${Math.round(stash.prob*100)}% rain</span>`);
    if (stash.wind != null) parts.push(`<span class="chip-val">${fmtNum(stash.wind,1)} m/s</span>`);
    readout.innerHTML = parts.length
      ? parts.join('<span class="sep">·</span>')
      : '<span class="time">hover or tap any panel</span>';
  }
  setReadout();

  function makePanel(elId, varData, color, opts){
    if (!varData || !varData.times.length){ return null; }
    const el = $(elId);
    const ts = parseTimes(varData.times).map(ms => ms/1000);
    const p50 = varData.percentiles.p50.slice();
    const p25 = varData.percentiles.p25 ? varData.percentiles.p25.slice() : null;
    const p75 = varData.percentiles.p75 ? varData.percentiles.p75.slice() : null;

    const showX = !!opts.showX;
    const height = opts.height;
    const kind = opts.kind || 'line';  // 'line' | 'bars' | 'area'
    const fillAlpha = opts.fillAlpha ?? 0.2;
    const rgb = opts.rgb;

    let series, data, bands = [];
    if (kind === 'bars'){
      data = [ts, p50];
      series = [{}, {
        stroke: color, width: 1,
        fill: `rgba(${rgb},0.55)`,
        points: {show:false},
        paths: uPlot.paths.bars({size:[0.75, 10]}),
      }];
    } else if (kind === 'area'){
      data = [ts, p50];
      series = [{}, {
        stroke: color, width: 1.25,
        fill: `rgba(${rgb},${fillAlpha})`,
        points: {show:false},
      }];
    } else {
      data = [ts, p25 ?? p50, p75 ?? p50, p50];
      series = [
        {},
        {stroke:'transparent', points:{show:false}, label:'p25'},
        {stroke:'transparent', points:{show:false}, label:'p75'},
        {stroke:color, width:1.7, points:{show:false}, label:'p50'},
      ];
      if (p25 && p75) bands.push({series:[2,1], fill:`rgba(${rgb},${fillAlpha})`});
    }

    const plot = new uPlot({
      width: el.clientWidth || 900,
      height,
      padding: [10, 12, showX ? 2 : 4, 4],
      scales: {
        x: {time:true, range: () => [xMin, xMax]},
        y: opts.yRange ? {auto:false, range: opts.yRange}
                       : {auto:true, range:(u, a, b) =>
                            opts.allowNegative ? [a - Math.max(0.5,(b-a)*0.08), b + Math.max(0.5,(b-a)*0.08)]
                                               : [0, Math.max(b,0.001) * 1.1]},
      },
      axes: commonAxes(showX, opts.yAxis || {}),
      series, bands,
      legend: {show:false},
      cursor: {
        drag:{setScale:false},
        sync: {key: syncKey, setSeries:false},
        points:{size:4, stroke:color, fill:'#fff', width:1.2},
        focus:{prox:18}, x:true, y:false,
      },
      hooks: {
        setCursor: [(u) => {
          const i = u.cursor.idx;
          if (i == null){ stash[opts.stashKey] = null; stash.time = null; setReadout(); return; }
          stash.time = ts[i]*1000;
          stash[opts.stashKey] = p50[i];
          setReadout();
        }],
      },
    }, data, el);
    return plot;
  }

  makePanel('mg-temp', T, 'rgb(229,89,74)', {
    height: 110, showX: false, kind:'line', fillAlpha: 0.18,
    rgb: '229,89,74', stashKey:'temp', allowNegative: true,
    yAxis: {space: 22},
  });
  makePanel('mg-prec', P, 'rgb(32,111,242)', {
    height: 80, showX: false, kind:'bars',
    rgb: '32,111,242', stashKey:'prec',
    yAxis: {space: 22},
  });
  // Probability panel — derive P(≥0.1 mm/h) series
  if (P && P.probability_exceeds && P.probability_exceeds['0.1']){
    const probVD = {
      times: P.times,
      unit: '%',
      percentiles: { p50: P.probability_exceeds['0.1'] },
    };
    makePanel('mg-prob', probVD, 'rgb(32,111,242)', {
      height: 56, showX: false, kind:'area', fillAlpha: 0.28,
      rgb: '32,111,242', stashKey:'prob',
      yRange: () => [0, 1],
      yAxis: {
        splits: [0, 0.25, 0.5, 0.75, 1.0],
        values: (u, vals) => vals.map(v => `${Math.round(v*100)}%`),
      },
    });
  }
  makePanel('mg-wind', W, 'rgb(43,70,114)', {
    height: 110, showX: true, kind:'line', fillAlpha: 0.18,
    rgb: '43,70,114', stashKey:'wind',
    yAxis: {space: 22},
  });
}

function mgHours(data){
  const all = [];
  for (const v of Object.values(data.variables || {})){
    if (v && v.times && v.times.length) all.push(...v.times.map(t => new Date(t).getTime()));
  }
  if (!all.length) return 0;
  return (Math.max(...all) - Math.min(...all)) / 3600000;
}

// ── per-variable controls ──────────────────────────────
function ensureControls(varName, vd){
  if (state.controls[varName]) return;
  const thresholds = Object.keys(vd.probability_exceeds || {});
  state.controls[varName] = { spread:'wide', threshold:thresholds[0] || null };
}

function makeSegControl(label, options, accent, activeKey, onChange){
  const el = document.createElement('div');
  el.className = 'ctrl';
  el.innerHTML = `<span class="ctrl-label">${label}</span>`;
  const seg = document.createElement('div');
  seg.className = 'seg';
  seg.dataset.accent = accent;
  options.forEach(opt => {
    const b = document.createElement('button');
    b.textContent = opt.label;
    b.dataset.key = opt.key;
    if (opt.key === activeKey) b.classList.add('active');
    b.addEventListener('click', () => {
      seg.querySelectorAll('button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      onChange(opt.key);
    });
    seg.appendChild(b);
  });
  el.appendChild(seg);
  return el;
}

// ── detail chart block ─────────────────────────────────
function renderBlock(parent, varName, data){
  const meta = VAR_META[varName];
  const vd = data.variables[varName];
  const block = document.createElement('section');
  block.className = 'block';
  block.innerHTML = `
    <div class="block-head">
      <div>
        <div class="block-title" data-var="${varName}">
          <span class="accent-dot"></span>
          <h2>${meta.label} <span class="unit">${vd ? vd.unit : ''}</span></h2>
        </div>
        <div class="block-desc">${meta.desc}</div>
      </div>
      <div class="controls" id="ctrl-${varName}"></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-scroll">
        <div class="chart" id="chart-${varName}"></div>
      </div>
      <div class="readout" id="readout-${varName}"></div>

  `;

function renderControls(varName, vd){
  const c = $(`ctrl-${varName}`);
  c.innerHTML = '';
  const accent = VAR_META[varName].accent;
  const cur = state.controls[varName];
  c.appendChild(makeSegControl('Spread', SPREADS, accent, cur.spread, (k) => {
    cur.spread = k; drawChart(varName, vd);
  }));
  const thresholds = Object.keys(vd.probability_exceeds || {});
  if (thresholds.length){
    const opts = thresholds.map(t => ({
      key:t, label:`≥${Number(t).toFixed(Number(t)<1?1:0)}`
    }));
    c.appendChild(makeSegControl('Threshold', opts, accent, cur.threshold, (k) => {
      cur.threshold = k; drawChart(varName, vd);
    }));
  }
}

function renderLegend(varName, vd){
  const l = $(`legend-${varName}`);
  const cur = state.controls[varName];
  let html = '';
  if (cur.spread === 'wide'){
    html += `<span><span class="sw outer"></span>P10–P90 range</span>`;
    html += `<span><span class="sw inner"></span>P25–P75 interquartile</span>`;
  } else if (cur.spread === 'inner'){
    html += `<span><span class="sw inner"></span>P25–P75 interquartile</span>`;
  }
  html += `<span><span class="sw median"></span>P50 median</span>`;
  if (cur.threshold){
    html += `<span><span class="sw threshold"></span>threshold ≥${cur.threshold} ${vd.unit}</span>`;
  }
  l.innerHTML = html;
}

// ── detail uPlot chart ─────────────────────────────────
function drawChart(varName, vd){
  const el = $(`chart-${varName}`);
  el.innerHTML = '';
  const cur = state.controls[varName];
  const meta = VAR_META[varName];

  // Always render the full forecast horizon — chart scrolls horizontally
  // via the wrapping .chart-scroll if the viewport is narrower.
  const times = parseTimes(vd.times);
  const sliced = {};
  for (const pct of ['p10','p25','p50','p75','p90']){
    sliced[pct] = vd.percentiles[pct];
  }
  const t = times.map(ms => ms/1000);

  const accent = `rgb(${meta.rgb})`;
  const outer4 = `rgba(${meta.rgb},0.14)`;
  const inner3 = `rgba(${meta.rgb},0.32)`;
  const glow   = `rgba(${meta.rgb},0.2)`;

  const data = [t, sliced.p10, sliced.p90, sliced.p25, sliced.p75, sliced.p50];
  const series = [
    {},
    {stroke:'transparent', points:{show:false}, label:'p10', show: cur.spread === 'wide'},
    {stroke:'transparent', points:{show:false}, label:'p90', show: cur.spread === 'wide'},
    {stroke:'transparent', points:{show:false}, label:'p25', show: cur.spread !== 'median'},
    {stroke:'transparent', points:{show:false}, label:'p75', show: cur.spread !== 'median'},
    {stroke:accent, width:2.0, points:{show:false}, label:'p50'},
  ];
  const bands = [];
  if (cur.spread === 'wide') bands.push({series:[2,1], fill:outer4});
  if (cur.spread !== 'median') bands.push({series:[4,3], fill:inner3});

  const thresholdVal = cur.threshold ? Number(cur.threshold) : null;
  const probs = vd.probability_exceeds || {};
  const probSeries = cur.threshold ? (probs[cur.threshold] || null) : null;

  const opts = {
    width: el.clientWidth || 900,
    height: 340,
    padding: [14, 60, 10, 10],
    scales: {
      x:{time:true},
      y:{auto:true, range:(u, dmin, dmax) => {
        const hasThresh = thresholdVal != null;
        if (meta.allowNegative){
          // Pad symmetrically around data; include threshold if set
          let lo = Math.min(dmin, hasThresh ? thresholdVal : dmin);
          let hi = Math.max(dmax, hasThresh ? thresholdVal : dmax);
          const pad = Math.max((hi - lo) * 0.08, 0.5);
          return [lo - pad, hi + pad];
        }
        const top = Math.max(dmax, hasThresh ? thresholdVal : 0);
        return [0, top * 1.05 + 0.001];
      }},
    },
    axes: [
      axisOpts({withDayLabel:true}),
      axisOpts({side:1, unit:vd.unit}),
    ],
    series, bands,
    legend:{show:false},
    cursor:{
      drag:{setScale:false},
      points:{size:6, stroke:accent, fill:'#ffffff', width:1.5},
      focus:{prox:18}, x:true, y:false,
    },
    hooks: {
      draw: [
        (u) => {
          // p50 glow
          const xs = u.data[0], ys = u.data[5];
          if (!xs || !ys || !xs.length) return;
          const ctx = u.ctx;
          ctx.save(); ctx.beginPath();
          ctx.strokeStyle = glow;
          ctx.lineWidth = 5;
          ctx.lineCap = 'round'; ctx.lineJoin = 'round';
          let started = false;
          for (let i = 0; i < xs.length; i++){
            if (ys[i] == null) { started = false; continue; }
            const x = u.valToPos(xs[i], 'x', true);
            const y = u.valToPos(ys[i], 'y', true);
            if (!started) { ctx.moveTo(x, y); started = true; }
            else { ctx.lineTo(x, y); }
          }
          ctx.stroke(); ctx.restore();
        },
        (u) => {
          if (thresholdVal == null) return;
          const ctx = u.ctx;
          const yPos = u.valToPos(thresholdVal, 'y', true);
          if (Number.isNaN(yPos)) return;
          ctx.save(); ctx.beginPath();
          ctx.strokeStyle = '#ffc800';
          ctx.setLineDash([4,3]); ctx.lineWidth = 1.25;
          ctx.moveTo(u.bbox.left, yPos);
          ctx.lineTo(u.bbox.left + u.bbox.width, yPos);
          ctx.stroke(); ctx.setLineDash([]);
          ctx.font = '600 13px Inter, sans-serif';
          ctx.fillStyle = '#6b5400';
          ctx.textAlign = 'right';
          ctx.fillText(`≥${thresholdVal} ${vd.unit}`, u.bbox.left + u.bbox.width - 4, yPos - 7);
          ctx.restore();
        }
      ],
      setCursor: [
        (u) => {
          const i = u.cursor.idx;
          if (i == null) { renderReadout(varName, null, vd, probSeries); return; }
          renderReadout(varName, {
            time: t[i]*1000,
            p10: sliced.p10[i], p25: sliced.p25[i], p50: sliced.p50[i],
            p75: sliced.p75[i], p90: sliced.p90[i],
            prob: probSeries ? probSeries[i] : null,
          }, vd, probSeries);
        }
      ],
    },
  };

  if (plots[varName]) { try { plots[varName].destroy(); } catch(e){} }
  plots[varName] = new uPlot(opts, data, el);
  renderLegend(varName, vd);
  renderReadout(varName, null, vd, probSeries);
}

function isNarrow(){ return window.innerWidth < 720; }

// Unified axis styling for every chart on the page (meteogram, detail, evolution).
// Same 3-hourly vertical grid, same finer horizontal grid, same palette + fonts.
function axisOpts({side=0, withDayLabel=false, unit=null} = {}){
  const narrow = isNarrow();
  if (side === 1){
    // No rotated unit label — the unit is already shown in the panel/block
    // title and in the hover readout. Keeps the axis tight.
    return {
      stroke: AXIS_STROKE,
      grid:{show:true, stroke:GRID_Y, width:1},
      ticks:{stroke:TICK_STROKE, width:1, size:4},
      font:`500 ${narrow ? 11 : 13}px Inter, sans-serif`,
      size: narrow ? 34 : 42,
      space: 20,
    };
  }
  const base = {
    stroke: AXIS_STROKE,
    grid:{show:true, stroke:GRID_X, width:1},
    ticks:{stroke:TICK_STROKE, width:1, size:5},
    font:`500 ${narrow ? 12 : 14}px Inter, sans-serif`,
    size: narrow ? 42 : 54,
    gap: narrow ? 6 : 8,
    space: narrow ? 95 : 85,
    splits: threeHourSplits,
  };
  if (withDayLabel){
    base.values = timeLabels;
  }
  return base;
}

function renderReadout(varName, row, vd, probSeries){
  const el = readouts[varName];
  if (!el) return;
  const cur = state.controls[varName];
  if (!row){
    el.innerHTML = `
      <span class="time">hover chart for values</span>
      <span class="sep">·</span>
      <span class="key">spread</span>
      <span class="val">${(SPREADS.find(s=>s.key===cur.spread)||{}).label}</span>
      ${cur.threshold ? `<span class="sep">·</span><span class="key">threshold</span><span class="val">≥${cur.threshold} ${vd.unit}</span>` : ''}
    `;
    return;
  }
  let html = `<span class="time">${fmtTime(row.time)}</span><span class="sep">·</span>`;
  html += `<span class="key">p50</span><span class="val">${fmtNum(row.p50, 2)} ${vd.unit}</span>`;
  if (cur.spread !== 'median'){
    html += `<span class="sep">·</span><span class="key">p25–p75</span>`;
    html += `<span class="val">${fmtNum(row.p25, 2)} → ${fmtNum(row.p75, 2)}</span>`;
  }
  if (cur.spread === 'wide'){
    html += `<span class="sep">·</span><span class="key">p10–p90</span>`;
    html += `<span class="val">${fmtNum(row.p10, 2)} → ${fmtNum(row.p90, 2)}</span>`;
  }
  if (cur.threshold && row.prob != null){
    const pct = Math.round(row.prob * 100);
    const color = pct >= 50 ? 'var(--sun-ink)' : 'var(--ink)';
    html += `<span class="sep">·</span>`;
    html += `<span class="key">P(≥${cur.threshold})</span><span class="val" style="color:${color}">${pct}%</span>`;
  }
  el.innerHTML = html;
}

// ── evolution ──────────────────────────────────────────
function shadeFor(rgb, i, n){
  const alpha = n <= 1 ? 1.0 : 1.0 - (i / (n - 1)) * 0.7;
  return `rgba(${rgb},${alpha.toFixed(3)})`;
}

function renderEvolution(){
  const root = $('evolution');
  root.innerHTML = '';
  if (!state.runs.length) return;
  const selectedRuns = [...state.runs].filter(r => state.evolutionSelected.has(r));

  const head = document.createElement('div');
  head.className = 'evolution-head';
  head.innerHTML = `
    <div>
      <div class="title">Forecast Evolution</div>
      <div class="desc">P50 median across recent runs — newer runs shown darker; click chips to toggle</div>
    </div>
    <div class="chip-actions">
      <button class="chip-action" id="evAll">All</button>
      <button class="chip-action" id="evNone">None</button>
      <button class="chip-action" id="evLast4">Last 4</button>
    </div>
  `;
  root.appendChild(head);

  for (const [varName, meta] of Object.entries(VAR_META)){
    const section = document.createElement('section');
    section.className = 'block';
    const unit = state.data?.variables?.[varName]?.unit || '';
    section.innerHTML = `
      <div class="block-head">
        <div>
          <div class="block-title" data-var="${varName}">
            <span class="accent-dot"></span>
            <h2>${meta.label} · run evolution <span class="unit">${unit}</span></h2>
          </div>
          <div class="block-desc">P50 median from each selected run</div>
        </div>
      </div>
      <div class="run-chips" id="chips-${varName}"></div>
      <div class="chart-wrap">
        <div class="chart-scroll">
          <div class="chart" id="evchart-${varName}"></div>
        </div>
      </div>
    `;
    root.appendChild(section);

    renderChips(varName, selectedRuns);
    drawEvolutionChart(varName, selectedRuns);
  }

  head.querySelector('#evAll').addEventListener('click', () => {
    state.evolutionSelected = new Set(state.runs);
    renderEvolution();
  });
  head.querySelector('#evNone').addEventListener('click', () => {
    state.evolutionSelected = new Set();
    renderEvolution();
  });
  head.querySelector('#evLast4').addEventListener('click', () => {
    state.evolutionSelected = new Set(state.runs.slice(0, 4));
    renderEvolution();
  });
}

function renderChips(varName, selectedRuns){
  const el = $(`chips-${varName}`);
  const meta = VAR_META[varName];
  el.innerHTML = '';
  const N = selectedRuns.length;
  state.runs.forEach(runId => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.dataset.accent = meta.accent;
    const isActive = state.evolutionSelected.has(runId);
    if (isActive) chip.classList.add('active');
    const idxInSelected = selectedRuns.indexOf(runId);
    const dotColor = isActive && idxInSelected >= 0
      ? shadeFor(meta.rgb, idxInSelected, N)
      : 'var(--line-2)';
    chip.innerHTML = `
      <span class="chip-dot" style="background:${dotColor}"></span>
      ${fmtRunShort(runId)}
    `;
    chip.addEventListener('click', () => {
      if (state.evolutionSelected.has(runId)) state.evolutionSelected.delete(runId);
      else state.evolutionSelected.add(runId);
      renderEvolution();
    });
    el.appendChild(chip);
  });
}

function drawEvolutionChart(varName, selectedRuns){
  const el = $(`evchart-${varName}`);
  el.innerHTML = '';
  if (evolutionPlots[varName]) { try { evolutionPlots[varName].destroy(); } catch(e){} }
  if (!selectedRuns.length){
    el.innerHTML = '<div class="empty">select at least one run above to see evolution</div>';
    return;
  }

  const meta = VAR_META[varName];
  const timelineSet = new Set();
  const perRun = [];
  for (const runId of selectedRuns){
    const vd = state.allRuns[runId]?.variables[varName];
    if (!vd || !vd.times.length) { perRun.push({runId, map:null}); continue; }
    const map = new Map();
    for (let i = 0; i < vd.times.length; i++){
      const t = new Date(vd.times[i]).getTime() / 1000;
      timelineSet.add(t);
      map.set(t, vd.percentiles.p50[i]);
    }
    perRun.push({runId, map, unit: vd.unit});
  }
  if (timelineSet.size === 0){
    el.innerHTML = '<div class="empty">no data for selected runs</div>';
    return;
  }
  const timeline = [...timelineSet].sort((a,b) => a - b);

  const data = [timeline];
  const series = [{}];
  const unit = perRun.find(r => r.unit)?.unit || '';
  const N = selectedRuns.length;
  perRun.forEach((r, i) => {
    const vals = timeline.map(t => r.map ? (r.map.has(t) ? r.map.get(t) : null) : null);
    data.push(vals);
    const color = shadeFor(meta.rgb, i, N);
    series.push({
      stroke: color,
      width: i === 0 ? 2.0 : 1.35,
      points: {show:false},
      label: fmtRunShort(r.runId),
      spanGaps: false,
    });
  });

  const meta2 = VAR_META[varName];
  const opts = {
    width: el.clientWidth || 900,
    height: 340,
    padding: [14, 60, 10, 10],
    scales: {
      x:{time:true},
      y:{auto:true, range:(u, dmin, dmax) => {
        if (meta2.allowNegative){
          const pad = Math.max((dmax - dmin) * 0.08, 0.5);
          return [dmin - pad, dmax + pad];
        }
        return [0, Math.max(dmax, 0.001) * 1.05];
      }},
    },
    axes: [
      axisOpts({withDayLabel:true}),
      axisOpts({side:1, unit}),
    ],
    series,
    legend:{show:false},
    cursor:{
      drag:{setScale:false},
      points:{size:5, fill:'#ffffff', width:1.5},
      focus:{prox:18}, x:true, y:false,
    },
  };
  evolutionPlots[varName] = new uPlot(opts, data, el);
}

// ── orchestration ──────────────────────────────────────
async function loadRun(runId){
  clearError();
  try {
    let data = state.allRuns[runId];
    if (!data) {
      data = await fetchRun(runId);
      state.allRuns[runId] = data;
    }
    state.data = data;
    state.controls = {};
    $('brandSub').textContent = `nearest grid cell ${fmtNum(data.grid_distance_km, 2)} km from target`;
    $('age').textContent = fmtAge(data.generated_at);
    $('footerRight').textContent = `run ${fmtRunLabel(runId)} · generated ${data.generated_at}`;

    renderMeteogram(data);
    const charts = $('charts');
    charts.innerHTML = '';
    for (const varName of Object.keys(VAR_META)){
      renderBlock(charts, varName, data);
    }
  } catch (e) {
    showError(`Failed to load run ${runId}: ${e.message}`);
  }
}

async function init(){
  try {
    const runs = await fetchRuns();
    state.runs = runs;
    if (!runs.length){
      showError('No forecast runs available. Run `python main.py` to generate one.');
      return;
    }
    const sel = $('runSelect');
    sel.innerHTML = runs.map(r => `<option value="${r}">${fmtRunLabel(r)}</option>`).join('');
    sel.value = runs[0];
    sel.addEventListener('change', () => loadRun(sel.value));
    await loadRun(runs[0]);

    $('evolution').innerHTML = '<div class="loading">loading run history…</div>';
    const others = runs.filter(r => !state.allRuns[r]);
    await Promise.all(others.map(async r => {
      try { state.allRuns[r] = await fetchRun(r); } catch(e){}
    }));

    state.evolutionSelected = new Set(runs.slice(0, Math.min(4, runs.length)));
    renderEvolution();

    let tmo;
    window.addEventListener('resize', () => {
      clearTimeout(tmo);
      tmo = setTimeout(() => {
        if (state.data) {
          renderMeteogram(state.data);
          for (const varName of Object.keys(VAR_META)){
            const vd = state.data.variables[varName];
            if (vd && vd.times.length) drawChart(varName, vd);
          }
        }
        renderEvolution();
      }, 180);
    });
  } catch (e) {
    showError(`Failed to fetch run list: ${e.message}`);
  }
}

init();
})();
</script>
</body>
</html>
